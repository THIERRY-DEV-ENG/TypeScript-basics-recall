<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="input" placeHolder="Enter a task">
    <button onclick="addTask()">Add</button>
    <ul  id="taskList"></ul>

    <script>
      
       let count = 0;

function addTask() {
    var task = document.getElementById("taskInput").value;
    if(task === "") return;
    document.getElementById("taskList").innerHTML += 
        "<li>" + task + " <button onclick='deleteTask(this)'>Delete</button> <button onclick='completeTask(this)'>Done</button></li>";
    document.getElementById("taskInput").value = "";
    
    count++; // increment task count
    document.getElementById("taskCount").innerHTML = count;
}

function deleteTask(button) {
    button.parentElement.remove();
    count--; // decrement task count
    document.getElementById("taskCount").innerHTML = count;
}

        
</body>
</html>
